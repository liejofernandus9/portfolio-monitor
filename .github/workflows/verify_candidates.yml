name: Verify Fund Manager Candidates

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # hard ceiling — auto-cancels instead of hanging indefinitely
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run candidate verification
        timeout-minutes: 7  # per-step ceiling, leaves buffer for setup steps
        run: python -u verify_candidates.py
