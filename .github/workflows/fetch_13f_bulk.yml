name: Fetch 13F Bulk Data

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # ~95MB download + extraction + parsing, generous buffer
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Check available disk space
        run: df -h /
      - name: Fetch and parse 13F bulk data
        timeout-minutes: 12
        run: python -u fetch_13f_bulk.py
      - name: Show output file size
        if: always()
        run: |
          ls -lh 13f_holdings_cache.json 2>/dev/null || echo "Output file not created"
      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 13f-holdings-cache
          path: 13f_holdings_cache.json
          retention-days: 90
